services:
  front:
    image: pat-front-prod
    pull_policy: never
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pat-front-prod
    depends_on:
      - back
  back:
    image: pat-back-prod
    pull_policy: never
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pat-back-prod
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: reverse-proxy-prod
    depends_on:
      - front
      - back
