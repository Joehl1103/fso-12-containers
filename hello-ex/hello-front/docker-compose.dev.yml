services:
  app:
    image: hello-front-dev
    # used  the rebuild the application. When an image is not present, uses the dockerfile, otherwise defaults to the image
    build:
      # file path for what to send to the docker daemon for the build
      context: .
      # name of the dockerfile to use for the build
      dockerfile: dev.Dockerfile
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - 5173:5173
    container_name: hello-front-dev
  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: reverse-proxy
    depends_on:
      - app

  debug-helper:
    image: busybox
